<!DOCTYPE html>
<html>
<head>
  <title>Travel Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>✈ TravelEase</h2>
</div>

<h1 class="title">Plan Your Trip Across India</h1>

  <img src="https://images.unsplash.com/photo-1589308078059-be1415eab4c3">
  <p>Andaman</p>
</div>

<!-- Meghalaya -->

  <img src="https://images.unsplash.com/photo-1622308644420-b20142dc993c">

</div>

    <div class="dest-card" onclick="selectPlace('Goa')">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
      <p>Goa</p>
    </div>

    <div class="dest-card" onclick="selectPlace('Manali')">
      <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
      <p>Manali</p>
    </div>

    <div class="dest-card" onclick="selectPlace('Hyderabad')">
      <img src="https://images.unsplash.com/photo-1599661046289-e31897846e41">

    </div>

      <img src="https://images.unsplash.com/photo-1587474260584-136574528ed5">
      <p>Delhi</p>
    </div>

  </div>

</div>

<h3 id="selectedPlace"></h3>

<!-- BUDGET CARD -->
<div class="card">

  <h2>Budget Planner</h2>

  <input type="number" id="budget" placeholder="Total Budget">
  <input type="number" id="days" placeholder="Days">
  <input type="number" id="travel" placeholder="Travel Cost">
  <input type="number" id="hotel" placeholder="Hotel per Day">
  <input type="number" id="food" placeholder="Food per Day">

  <br><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>
<div class="chart-box"></div>
  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
