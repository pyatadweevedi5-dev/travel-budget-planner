<!DOCTYPE html>
<html>
<head>
  <title>Travel Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">✈ Travel Budget Planner</h1>

<input type="text" id="search" placeholder="Search destination...">

<div class="filters">
  <button onclick="filterPlaces('all')">All</button>
  <button onclick="filterPlaces('mountain')">Mountains</button>
  <button onclick="filterPlaces('beach')">Beach</button>
  <button onclick="filterPlaces('city')">City</button>
</div>

<div id="grid" class="grid"></div>
<div id="details"></div>
<div class="budget-box">
  <h3>💰 Plan Your Budget</h3>

  <input type="number" id="budget" placeholder="Enter your budget">
  <input type="number" id="days" placeholder="Number of days">

  <button onclick="calculateTrip()">Calculate</button>

  <h3 id="tripResult"></h3>
</div>

<script src="script.js"></script>
</body>
</html>
