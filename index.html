<!DOCTYPE html>
<html>
<head>
  <title>TravelEase</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- LOGIN BOX -->
<div class="login-box">

  <h1>✈ TravelEase</h1>
  <p>Plan smarter. Travel better.</p>

  <input type="text" id="username" placeholder="Enter your name">

  <button class="primary-btn" onclick="login()">Start Planning</button>

  <div class="divider">OR</div>

  <button class="google-btn" onclick="fakeGoogle()">Continue with Google</button>

</div>

<script src="script.js"></script>

</body>
</html>
